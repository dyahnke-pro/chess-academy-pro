# Supabase project config — Chess Academy Pro
#
# This file is consumed by the Supabase CLI (`npx supabase ...`). It
# is checked into git so the local Supabase instance and migrations
# behave identically across machines and CI. Production credentials
# are NEVER stored here — they live in environment variables /
# Supabase project secrets.
#
# To work with this locally:
#   1. Install the CLI:  https://supabase.com/docs/guides/cli
#      (Homebrew:  `brew install supabase/tap/supabase`)
#   2. Log in:  `supabase login`
#   3. Link the project:  `supabase link --project-ref <ref>`
#   4. Apply migrations:  `npm run db:migrate`
#
# See docs/RLS-CHECKLIST.md before adding any new table.

project_id = "chess-academy-pro"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_signup = true

[storage]
enabled = false
